services:
  postgres:
    image: postgres:15-alpine
    container_name: leanstock_postgres
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: leanstock_password
      POSTGRES_DB: leanstock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock -d leanstock"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: leanstock_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build: .
    container_name: leanstock_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment: &app_env
      NODE_ENV: ${NODE_ENV:-development}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 3000
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://leanstock:leanstock_password@postgres:5432/leanstock?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      EMAIL_VERIFICATION_TOKEN_MINUTES: ${EMAIL_VERIFICATION_TOKEN_MINUTES:-30}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-15}
      RESERVATION_TTL_MINUTES: ${RESERVATION_TTL_MINUTES:-15}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      ENABLE_WORKER: "false"
      DEAD_STOCK_CRON_MINUTES: ${DEAD_STOCK_CRON_MINUTES:-60}
      DEAD_STOCK_AGE_DAYS: ${DEAD_STOCK_AGE_DAYS:-30}
      DEAD_STOCK_DECAY_PERCENT: ${DEAD_STOCK_DECAY_PERCENT:-10}
      DEAD_STOCK_DECAY_INTERVAL_HOURS: ${DEAD_STOCK_DECAY_INTERVAL_HOURS:-72}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM: ${EMAIL_FROM:-LeanStock <your_email@gmail.com>}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-your_email@gmail.com}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_QUEUE_ATTEMPTS: ${EMAIL_QUEUE_ATTEMPTS:-3}
      SUPERADMIN_SETUP_KEY: ${SUPERADMIN_SETUP_KEY:-local-super-admin-setup-key}
    command: sh -c "npx prisma migrate deploy && node src/server.js"

  worker:
    build: .
    container_name: leanstock_worker
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      <<: *app_env
      PORT: 3001
      ENABLE_WORKER: "true"
    command: sh -c "npx prisma migrate deploy && npm run worker"

  frontend:
    build: ./frontend
    container_name: leanstock_frontend
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
